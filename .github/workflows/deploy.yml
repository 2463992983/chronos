name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/${{ github.event.repository.name }}/" />|' wwwroot/index.html

      - name: Publish
        run: dotnet publish Godot_Learning_WebSite.csproj -c Release -o publish

      - name: Add SPA fallback
        run: cp publish/index.html publish/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
